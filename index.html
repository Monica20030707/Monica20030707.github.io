<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400&family=Tinos:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Your Name/Logo</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="hero">
            <h1>Welcome to My Tech World</h1>
            <p>A brief introduction about yourself.</p>
            <button>Learn More</button>
        </section>
        <section id="about">
            <img src="your-photo.jpg" alt="Your Photo">
            <div class="bio">
                <h2>About Me</h2>
                <p>A brief bio about yourself.</p>
            </div>
        </section>
        <section id="projects">
            <h2>Projects</h2>
            <div class="project-grid">
                <!-- Add your projects here -->
            </div>
        </section>
        <section id="blog">
            <h2>Blog</h2>
            <div class="blog-list">
                <!-- Add your blog posts here -->
            </div>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>
                <button type="submit">Send</button>
            </form>
            <div class="social-media">
                <!-- Add your social media links here -->
            </div>
        </section>
    </main>
    <footer>
        <p>© 2024 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
